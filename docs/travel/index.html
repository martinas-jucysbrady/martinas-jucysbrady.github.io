  function makePolaroidIcon(name, size) {

    var total = size + 14;
    return L.divIcon({
      className:'',
      html:'<div class="polaroid-marker" style="width:'+size+'px;">' +

               '</svg>' +
             '</div>' +

           '</div>',
      iconSize:[total,total], iconAnchor:[total/2,total], popupAnchor:[0,-(total+2)]

           '</div><div style="font-style:italic;color:#3a3a3a;font-size:0.95rem;">'+name+'</div></div>';
  }

  // ── State ─────────────────────────────────────────────────────────────────
  var activeMarkers = [];
  var currentRegion = 'world';
  var currentEuRegion = null;

  function clearMarkers() {
    activeMarkers.forEach(function(m){ tmap.removeLayer(m); });
    activeMarkers = [];
    Object.values(regionRects).forEach(function(r){ tmap.removeLayer(r); });
    document.getElementById('okinawa-inset').style.display = 'none';
    document.getElementById('madeira-inset').style.display = 'none';
  }

  function showSidebar(title, items) {
    document.getElementById('sidebar-title').textContent = title;
    document.getElementById('sidebar-list').innerHTML = items.map(function(p){
      return '<li>'+p.name+'</li>';
    }).join('');
    document.getElementById('sidebar').style.display = 'block';
    document.getElementById('back-btn').style.display = 'block';
  }

  function hideSidebar() {
    document.getElementById('sidebar').style.display = 'none';
  }

  // ── World ─────────────────────────────────────────────────────────────────
  function showWorld() {
    clearMarkers(); hideSidebar();
    Object.entries(regionRects).forEach(function(e){
      var id=e[0], rect=e[1];
      rect.addTo(tmap);
      rect.on('click', function(){ document.querySelector('[data-region="'+id+'"]').click(); });
      rect.on('mouseover', function(){ this.setStyle({fillOpacity:0.28}); });
      rect.on('mouseout',  function(){ this.setStyle({fillOpacity:0.12}); });
    });
  }

  // ── Europe clusters ───────────────────────────────────────────────────────
  function showEurope() {
    clearMarkers(); hideSidebar();
    euRegions.forEach(function(region){
      var m = L.marker(region.center, {icon: makePinIcon('📍'), zIndexOffset:200})
        .addTo(tmap)
        .bindTooltip(region.label, {permanent:false, direction:'top', offset:[0,-24]});
      m.on('click', function(){ drillIntoEuRegion(region); });
      activeMarkers.push(m);
    });
  }

  function drillIntoEuRegion(region) {
    currentEuRegion = region;
    activeMarkers.forEach(function(m){ tmap.removeLayer(m); });
    activeMarkers = [];
    tmap.flyTo(region.center, region.zoom, {duration:1.0});
    setTimeout(function(){
      region.countries.forEach(function(c){
        var m = L.marker(c.latlng, {icon: makePolaroidIcon(c.name, 38), zIndexOffset:300})
          .addTo(tmap).bindPopup(makePolaroidPopup(c.name), {maxWidth:200});
        activeMarkers.push(m);
      });
      showSidebar(region.label, region.countries);
      if (region.hasMadeiraInset) {
        document.getElementById('madeira-inset').style.display = 'block';
        setTimeout(function(){
          initMadeiraInset();
          if (mad_map) mad_map.invalidateSize();
        }, 120);
      }
    }, 950);
  }

  // ── East Asia ─────────────────────────────────────────────────────────────
  function showEastAsia() {
    clearMarkers(); hideSidebar();
    eaAreas.forEach(function(area){
      var m = L.marker(area.center, {icon: makePinIcon('📍'), zIndexOffset:200})
        .addTo(tmap)
        .bindTooltip(area.label, {permanent:false, direction:'top', offset:[0,-24]});
      m.on('click', function(){ drillIntoEaArea(area); });
      activeMarkers.push(m);
    });
    document.getElementById('okinawa-inset').style.display = 'block';
    setTimeout(function(){
      initOkinawaInset();
      if (oki_map) oki_map.invalidateSize();
    }, 120);
  }

  function drillIntoEaArea(area) {
    activeMarkers.forEach(function(m){ tmap.removeLayer(m); });
    activeMarkers = [];
    document.getElementById('okinawa-inset').style.display = 'none';
    tmap.flyTo(area.center, area.zoom, {duration:1.0});
    setTimeout(function(){
      area.prefectures.forEach(function(p){
        var m = L.marker(p.latlng, {icon: makePolaroidIcon(p.name, 38), zIndexOffset:300})
          .addTo(tmap).bindPopup(makePolaroidPopup(p.name), {maxWidth:200});
        activeMarkers.push(m);
      });
      showSidebar(area.label, area.prefectures);
    }, 950);
  }

  // ── Simple regions ────────────────────────────────────────────────────────
  function showSimpleRegion(region) {
    clearMarkers(); hideSidebar();
    (simplePlaces[region]||[]).forEach(function(p){
      var m = L.marker(p.latlng, {icon: makePolaroidIcon(p.name, 40), zIndexOffset:100})
        .addTo(tmap).bindPopup(makePolaroidPopup(p.name), {maxWidth:200});
      activeMarkers.push(m);
    });
  }

  // ── Back ──────────────────────────────────────────────────────────────────
  document.getElementById('back-btn').addEventListener('click', function(){
    hideSidebar();
    document.getElementById('madeira-inset').style.display = 'none';
    var v = regionViews[currentRegion];
    tmap.flyTo(v.center, v.zoom, {duration:1.0});
    setTimeout(function(){
      if      (currentRegion === 'europe')    showEurope();
      else if (currentRegion === 'east-asia') showEastAsia();
    }, 950);
  });

  // ── Buttons ───────────────────────────────────────────────────────────────
  document.querySelectorAll('.tmap-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.tmap-btn').forEach(function(b){ b.classList.remove('active'); });
      this.classList.add('active');
      var region = this.getAttribute('data-region');
      currentRegion = region;
      tmap.flyTo(regionViews[region].center, regionViews[region].zoom, {duration:1.2});
      setTimeout(function(){
        if      (region==='world')      showWorld();
        else if (region==='europe')     showEurope();
        else if (region==='east-asia')  showEastAsia();
        else                            showSimpleRegion(region);
      }, 500);
    });
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  showWorld();
  document.querySelector('[data-region="world"]').classList.add('active');

})();
</script>
