<script>

  // ── Simple places for other regions ─────────────────────────────────────
  var simplePlaces = {
    'europe': [

      {name:'Como',          latlng:[45.81,9.09]},
      {name:'Genoa',         latlng:[44.41,8.93]},

      {name:'Lithuania',     latlng:[55.17,23.88]},
      {name:'Wexford',       latlng:[52.34,-6.46]},
      {name:'Fermanagh',     latlng:[54.35,-7.63]}
    ],
    'se-asia': [
      {name:'Taipei', latlng:[25.03,121.56]},
      {name:'Hanoi',  latlng:[21.03,105.85]}
    ],
    'australia': [
      {name:'Sydney',    latlng:[-33.87,151.21]},
      {name:'Perth',     latlng:[-31.95,115.86]},
      {name:'Busselton', latlng:[-33.65,115.35]}
    ]
  };

  // ── World region rectangles ──────────────────────────────────────────────
  var regionRects = {
    'europe':    L.rectangle([[35,-25],[71,40]],    {color:'#c9aa96',weight:1.5,fillColor:'#c9aa96',fillOpacity:0.15}),
    'east-asia': L.rectangle([[25,128],[50,148]],   {color:'#9ab8c9',weight:1.5,fillColor:'#9ab8c9',fillOpacity:0.15}),
    'se-asia':   L.rectangle([[10,100],[27,123]],   {color:'#9ac9ab',weight:1.5,fillColor:'#9ac9ab',fillOpacity:0.15}),
    'australia': L.rectangle([[-44,113],[-10,154]], {color:'#c9b89a',weight:1.5,fillColor:'#c9b89a',fillOpacity:0.15})
  };

  // ── Icon helpers ─────────────────────────────────────────────────────────
  function areaDotIcon(label) {
    return L.divIcon({
      className:'',
      html:'<div class="area-dot" title="' + label + '" style="width:16px;height:16px;background:#9ab8c9;border:2.5px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;"></div>',
      iconSize:[16,16], iconAnchor:[8,8], popupAnchor:[0,-10]
    });
  }

  function placeDotIcon(color) {
    return L.divIcon({
      className:'',
      html:'<div style="width:11px;height:11px;background:' + (color||'#c9aa96') + ';border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.25);"></div>',
      iconSize:[11,11], iconAnchor:[5,5], popupAnchor:[0,-8]
    });
  }

  // ── State ─────────────────────────────────────────────────────────────────
  var activeMarkers = [];
  var currentRegion = 'world';
  var currentArea   = null;

  function clearMarkers() {
    activeMarkers.forEach(function(m){ tmap.removeLayer(m); });
    activeMarkers = [];
    Object.values(regionRects).forEach(function(r){ tmap.removeLayer(r); });
  }

  // ── Sidebar ───────────────────────────────────────────────────────────────
  function showSidebar(title, places) {
    var sb = document.getElementById('sidebar');
    var st = document.getElementById('sidebar-title');
    var sl = document.getElementById('sidebar-list');
    st.textContent = title;
    sl.innerHTML = places.map(function(p){
      return '<li>' + p.name + '</li>';
    }).join('');
    sb.style.display = 'block';
    document.getElementById('back-btn').style.display = 'block';
  }

  function hideSidebar() {
    document.getElementById('sidebar').style.display = 'none';
  }

  // ── Render functions ──────────────────────────────────────────────────────
  function showWorld() {
    clearMarkers(); hideSidebar();
    currentArea = null;
    Object.entries(regionRects).forEach(function(entry){
      var id = entry[0], rect = entry[1];
      rect.addTo(tmap);
      rect.on('click', function(){ document.querySelector('[data-region="'+id+'"]').click(); });
      rect.on('mouseover', function(){ this.setStyle({fillOpacity:0.32}); });
      rect.on('mouseout',  function(){ this.setStyle({fillOpacity:0.15}); });
    });
  }

  function showSimpleRegion(region) {
    clearMarkers(); hideSidebar();
    currentArea = null;
    var color = {europe:'#c9aa96','se-asia':'#9ac9ab',australia:'#c9b89a'}[region] || '#c9aa96';
    (simplePlaces[region]||[]).forEach(function(p){
      var m = L.marker(p.latlng, {icon: placeDotIcon(color)})
        .addTo(tmap)
        .bindPopup('<div style="text-align:center;font-family:Georgia,serif;font-style:italic;color:#3a3a3a;font-size:1rem;padding:4px 8px;">'+p.name+'</div>', {maxWidth:160});
      activeMarkers.push(m);
    });
  }

  function showEastAsia() {
    clearMarkers(); hideSidebar();
    currentArea = null;
    eaAreas.forEach(function(area){
      var m = L.marker(area.center, {icon: areaDotIcon(area.label)})
        .addTo(tmap)
        .bindTooltip(area.label, {permanent:false, direction:'top', className:'', offset:[0,-10]});
      m.on('click', function(){ drillIntoArea(area); });
      activeMarkers.push(m);
    });
  }

  function drillIntoArea(area) {
    currentArea = area.id;
    // Remove area cluster dots
    activeMarkers.forEach(function(m){ tmap.removeLayer(m); });
    activeMarkers = [];

    tmap.flyTo(area.center, area.zoom, {duration:1.0});

    setTimeout(function(){
      area.places.forEach(function(p){
        var m = L.marker(p.latlng, {icon: placeDotIcon('#9ab8c9')})
          .addTo(tmap)
          .bindPopup('<div style="text-align:center;font-family:Georgia,serif;font-style:italic;color:#3a3a3a;font-size:1rem;padding:4px 8px;">'+p.name+'</div>', {maxWidth:160});
        activeMarkers.push(m);
      });
      showSidebar(area.label, area.places);
    }, 900);
  }

  // ── Back button ───────────────────────────────────────────────────────────
  document.getElementById('back-btn').addEventListener('click', function(){
    currentArea = null;
    hideSidebar();
    var v = regionViews['east-asia'];
    tmap.flyTo(v.center, v.zoom, {duration:1.0});
    setTimeout(function(){ showEastAsia(); }, 900);
  });

  // ── Region buttons ────────────────────────────────────────────────────────
  document.querySelectorAll('.tmap-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.tmap-btn').forEach(function(b){ b.classList.remove('active'); });
      this.classList.add('active');
      var region = this.getAttribute('data-region');
      currentRegion = region;
      var v = regionViews[region];
      tmap.flyTo(v.center, v.zoom, {duration:1.2});
      setTimeout(function(){
        if (region === 'world')          showWorld();
