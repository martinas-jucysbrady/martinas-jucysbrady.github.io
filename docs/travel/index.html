      doubleClickZoom:false

    L.tileLayer(cartoLabels, { subdomains:'abcd', maxZoom:19, opacity:0.5 }).addTo(oki_map);
    // Okinawa polaroid on inset
    var pol = makePolaroidIcon('Okinawa', 32);
    L.marker([26.33,127.80], { icon: pol, zIndexOffset:500 })
      .addTo(oki_map)
      .bindPopup(makePolaroidPopup('Okinawa'), {maxWidth:180, className:'polaroid-popup'});

  // ── Polaroid icon factory ─────────────────────────────────────────────────
  function makePolaroidIcon(name, size) {
    size = size || 44;
    var imgH = Math.round(size * 0.85);
    var total = size + 16;
    return L.divIcon({
      className:'',
      html: '<div class="polaroid-marker" style="width:'+size+'px;">' +
              '<div class="polaroid-img" style="width:'+size+'px;height:'+imgH+'px;">' +
                '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5">' +
                  '<rect x="3" y="3" width="18" height="18" rx="2"/>' +
                  '<circle cx="8.5" cy="8.5" r="1.5"/>' +
                  '<polyline points="21,15 16,10 5,21"/>' +
                '</svg>' +
              '</div>' +
              '<div class="polaroid-label">'+name+'</div>' +
            '</div>',
      iconSize:[total, total+4],
      iconAnchor:[total/2, total+4],
      popupAnchor:[0, -(total+4)]
    });
  }

  function makePolaroidPopup(name) {
    return '<div style="text-align:center;padding:6px 10px;font-family:Georgia,serif;">' +
           '<div style="width:120px;height:100px;background:#f5f0eb;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;border-radius:2px;">' +
           '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>' +
           '</div>' +
           '<div style="font-style:italic;color:#3a3a3a;font-size:0.95rem;">'+name+'</div>' +
           '</div>';
  }

  // ── Area cluster icon ─────────────────────────────────────────────────────
  function makeAreaIcon(label) {
    return L.divIcon({
      className:'',
      html:'<div class="area-cluster" title="'+label+'"></div>',
      iconSize:[13,13], iconAnchor:[6,6], popupAnchor:[0,-10]
    });
  }

  // ── State ─────────────────────────────────────────────────────────────────
  var activeMarkers = [];
  var currentRegion = 'world';

  function clearMarkers() {
    activeMarkers.forEach(function(m){ tmap.removeLayer(m); });
    activeMarkers = [];
    Object.values(regionRects).forEach(function(r){ tmap.removeLayer(r); });
    document.getElementById('okinawa-inset').style.display = 'none';
  }

  // ── Sidebar ───────────────────────────────────────────────────────────────
  function showSidebar(title, places) {
    document.getElementById('sidebar-title').textContent = title;
    document.getElementById('sidebar-list').innerHTML = places.map(function(p){
      return '<li>'+p.name+'</li>';
    }).join('');
    document.getElementById('sidebar').style.display = 'block';
    document.getElementById('back-btn').style.display = 'block';
  }

  function hideSidebar() {
    document.getElementById('sidebar').style.display = 'none';
  }

  // ── Render: world ─────────────────────────────────────────────────────────
  function showWorld() {
    clearMarkers(); hideSidebar();
    Object.entries(regionRects).forEach(function(e){
      var id=e[0], rect=e[1];
      rect.addTo(tmap);
      rect.on('click', function(){ document.querySelector('[data-region="'+id+'"]').click(); });
      rect.on('mouseover', function(){ this.setStyle({fillOpacity:0.28}); });
      rect.on('mouseout',  function(){ this.setStyle({fillOpacity:0.12}); });
    });
  }

  // ── Render: simple regions ────────────────────────────────────────────────
  function showSimpleRegion(region) {
    clearMarkers(); hideSidebar();
    (simplePlaces[region]||[]).forEach(function(p){
      var m = L.marker(p.latlng, { icon: makePolaroidIcon(p.name), zIndexOffset:100 })
        .addTo(tmap)
        .bindPopup(makePolaroidPopup(p.name), {maxWidth:200, className:'polaroid-popup'});
      activeMarkers.push(m);
    });
  }

  // ── Render: East Asia clusters ────────────────────────────────────────────
  function showEastAsia() {
    clearMarkers(); hideSidebar();
    // Show mainland Japan + Korea — Okinawa lives in the inset
    eaAreas.forEach(function(area){
      if (area.id === 'okinawa') return;
      var m = L.marker(area.center, { icon: makeAreaIcon(area.label), zIndexOffset:200 })
        .addTo(tmap)
        .bindTooltip(area.label, {permanent:false, direction:'top', offset:[0,-8], className:''});
      m.on('click', function(){ drillIntoArea(area); });
      activeMarkers.push(m);
    });
    // Show Okinawa inset
    document.getElementById('okinawa-inset').style.display = 'block';
    setTimeout(function(){
      initOkinawaInset();
      if (oki_map) oki_map.invalidateSize();
    }, 100);
  }

  // ── Drill into area ───────────────────────────────────────────────────────
  function drillIntoArea(area) {
    activeMarkers.forEach(function(m){ tmap.removeLayer(m); });
    activeMarkers = [];
    tmap.flyTo(area.center, area.zoom, {duration:1.0});
    setTimeout(function(){
      area.places.forEach(function(p){
        var m = L.marker(p.latlng, { icon: makePolaroidIcon(p.name, 40), zIndexOffset:300 })
          .addTo(tmap)
          .bindPopup(makePolaroidPopup(p.name), {maxWidth:200});
        activeMarkers.push(m);
      });
      showSidebar(area.label, area.places);
    }, 950);
  }

  // ── Back button ───────────────────────────────────────────────────────────
  document.getElementById('back-btn').addEventListener('click', function(){
    hideSidebar();
    tmap.flyTo(regionViews['east-asia'].center, regionViews['east-asia'].zoom, {duration:1.0});
    setTimeout(function(){ showEastAsia(); }, 950);
  });

  // ── Region buttons ────────────────────────────────────────────────────────
  document.querySelectorAll('.tmap-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.tmap-btn').forEach(function(b){ b.classList.remove('active'); });
      this.classList.add('active');
      var region = this.getAttribute('data-region');
      currentRegion = region;
      tmap.flyTo(regionViews[region].center, regionViews[region].zoom, {duration:1.2});
      setTimeout(function(){
        if      (region === 'world')      showWorld();
        else if (region === 'east-asia')  showEastAsia();
        else                              showSimpleRegion(region);
      }, 500);
    });
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  showWorld();
  document.querySelector('[data-region="world"]').classList.add('active');

})();
</script>
